<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUTOTRACK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="logo-full">AUTOTRACK</span>
          <span class="logo-short">A</span>
        </div>
      </div>

      <div class="sidebar-static">
        <div class="sidebar-card-group">
          <a href="#home" class="nav-item active" data-page="home">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5 9.5V19a1 1 0 001 1h12a1 1 0 001-1V9.5"/>
            </svg>
            <span>Home</span>
          </a>
          <a href="#search" class="nav-item" data-page="search">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"/>
              <path d="M16 16l4.5 4.5"/>
            </svg>
            <span>Search</span>
          </a>
          <a href="#browse" class="nav-item" data-page="browse">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1.5"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            <span>Browse</span>
          </a>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-card-group menu-card">
          <div class="menu-card-items">
            <div class="sidebar-label">MENU</div>
            <a href="#inventory" class="nav-item" data-page="inventory">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                <path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/>
              </svg>
              <span>Inventory</span>
            </a>
            <a href="#vehicle" class="nav-item" data-page="vehicle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 17h14M5 17a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h8l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2M5 17a2 2 0 100 4 2 2 0 000-4zM19 17a2 2 0 100 4 2 2 0 000-4z"/>
              </svg>
              <span>Vehicle</span>
            </a>
            <a href="#billing" class="nav-item" data-page="billing">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2"/>
                <path d="M1 10h22"/>
              </svg>
              <span>Billing</span>
            </a>
            <a href="#reports" class="nav-item" data-page="reports">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 20V10M12 20V4M6 20v-6"/>
              </svg>
              <span>Reports</span>
            </a>
            <a href="#notification" class="nav-item" data-page="notification">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 01-3.46 0"/>
              </svg>
              <span>Notification</span>
            </a>
            <a href="#members" class="nav-item" data-page="members">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                <path d="M16 3.13a4 4 0 010 7.75"/>
              </svg>
              <span>Members</span>
            </a>
            <a href="#history" class="nav-item" data-page="history">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
              <span>History</span>
            </a>
          </div>
          <div class="menu-card-bottom">
            <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
              </svg>
              <span class="theme-toggle-label"></span>
            </button>
          </div>
        </div>

        <div class="sidebar-card-group profile-card">
          <a href="#account" class="nav-item profile-item" data-page="account">
            <div class="profile-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 21v-1a6 6 0 0112 0v1"/>
              </svg>
            </div>
            <div class="profile-info">
              <span class="profile-name">Admin</span>
              <span class="profile-status">Manage account</span>
            </div>
          </a>
        </div>
      </nav>

      <button id="sidebar-toggle" class="sidebar-toggle" title="Collapse sidebar">
        <i class="fas fa-chevron-left"></i>
      </button>
    </aside>

    <main class="main-content">
      <header class="content-header">
        <button id="mobile-toggle" class="mobile-toggle" title="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="page-title">Home</h1>
      </header>

      <div class="content-body">
        <div id="page-container"></div>
      </div>
    </main>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
